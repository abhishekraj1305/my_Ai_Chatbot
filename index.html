<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abhishek's AI Bot</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f5ff;
        --ink: #161022;
        --purple: #a855f7;
        --purple-dark: #7e22ce;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        padding: 28px 18px 18px;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 3rem);
        line-height: 1.1;
      }
      p {
        margin: 10px auto 0;
        max-width: 720px;
        color: #5b506b;
      }
      .shell {
        width: min(980px, calc(100% - 24px));
        margin: 0 auto 24px;
        border: 1px solid rgba(168, 85, 247, 0.22);
        border-radius: 18px;
        overflow: hidden;
        background: white;
        box-shadow: 0 24px 60px rgba(88, 28, 135, 0.15);
      }
      iframe {
        display: block;
        width: 100%;
        height: 760px;
        border: 0;
      }
      .fallback {
        text-align: center;
        padding: 0 18px 28px;
      }
      a {
        color: var(--purple-dark);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Abhishek's AI Bot</h1>
      <p>Ask about Abhishek's work, projects, services, book, or book a call.</p>
    </header>
    <main class="shell">
      <iframe
        src="https://darknightcoder-abhishek-ai-bot.hf.space"
        title="Abhishek's AI Bot"
        allow="clipboard-read; clipboard-write">
      </iframe>
    </main>
    <div class="fallback">
      <p>
        If the embedded app is sleeping, open it directly:
        <a href="https://darknightcoder-abhishek-ai-bot.hf.space">darknightcoder-abhishek-ai-bot.hf.space</a>
      </p>
    </div>
  </body>
</html>
